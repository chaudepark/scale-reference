<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sub Note → Scale → Key</title>
<style>
  :root {
    --bg: #0f1115;
    --card: #181b22;
    --card-border: #262b36;
    --text: #e6e9ef;
    --muted: #8b93a3;
    --accent: #6ea8fe;
    --major: #5db075;
    --minor: #d98a4b;
    --hminor: #b07ad9;
    --mminor: #4bb0c0;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 2rem 1.25rem 4rem;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  header {
    max-width: 1100px;
    margin: 0 auto 2rem;
  }
  h1 {
    font-size: 1.5rem;
    font-weight: 700;
    margin: 0 0 .35rem;
    letter-spacing: .01em;
  }
  .sub {
    color: var(--muted);
    font-size: .9rem;
    margin: 0;
  }
  .grid {
    max-width: 1100px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 1.1rem;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    padding: 1.1rem 1.2rem 1.3rem;
  }
  .note {
    display: inline-flex;
    align-items: baseline;
    gap: .5rem;
    margin: 0 0 1rem;
  }
  .note .label {
    font-size: 1.9rem;
    font-weight: 800;
    line-height: 1;
    letter-spacing: .02em;
  }
  .note .tag {
    font-size: .72rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .08em;
  }
  .row { margin-bottom: .85rem; }
  .row:last-child { margin-bottom: 0; }
  .type {
    display: flex;
    align-items: center;
    gap: .45rem;
    font-size: .78rem;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: .45rem;
    text-transform: uppercase;
    letter-spacing: .05em;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }
  .dot.major { background: var(--major); }
  .dot.minor { background: var(--minor); }
  .dot.hminor { background: var(--hminor); }
  .dot.mminor { background: var(--mminor); }
  .keys { display: flex; flex-wrap: wrap; gap: .4rem; }
  .key {
    font-size: .85rem;
    font-weight: 600;
    padding: .22rem .55rem;
    border-radius: 7px;
    background: #20242e;
    border: 1px solid #2c3240;
    font-variant-numeric: tabular-nums;
  }
  .major .key { border-color: rgba(93,176,117,.35); }
  .minor .key { border-color: rgba(217,138,75,.35); }
  .hminor .key { border-color: rgba(176,122,217,.35); }
  .mminor .key { border-color: rgba(75,176,192,.35); }
  footer {
    max-width: 1100px;
    margin: 2.5rem auto 0;
    color: var(--muted);
    font-size: .8rem;
  }
</style>
</head>
<body>
<header>
  <h1>Sub Note → Scale → Key</h1>
  <p class="sub">楽曲制作用の早見表</p>
</header>

<main class="grid" id="grid"></main>

<footer>major · minor · harmonic minor · melodic minor</footer>

<script>
  const DATA = [
    { note: "E", scales: {
      major: ["C","G","D","A","E","F","B"],
      minor: ["A","E","D","B","F#","C#","G#"],
      hminor: ["A","D","E"],
      mminor: ["A","D"],
    }},
    { note: "F", scales: {
      major: ["C","F","E♭","A♭"],
      minor: ["A","D","C","F","G"],
      hminor: ["D","A","C"],
      mminor: ["C"],
    }},
    { note: "F#", scales: {
      major: ["G","D","A","E","B"],
      minor: ["E","B","F#","C#","G#"],
      hminor: ["E"],
      mminor: ["A","D"],
    }},
    { note: "G", scales: {
      major: ["C","F","G","D","E♭","A♭"],
      minor: ["A","D","E","B","C","F","G"],
      hminor: ["D","E","C"],
      mminor: ["D"],
    }},
    { note: "G#", scales: {
      major: ["A","E","B","E♭","A♭"],
      minor: ["F#","C#","G#","C","F"],
      hminor: ["A","C"],
      mminor: ["A"],
    }},
  ];

  const LABELS = {
    major: "major",
    minor: "minor",
    hminor: "harmonic minor",
    mminor: "melodic minor",
  };

  const grid = document.getElementById("grid");
  for (const { note, scales } of DATA) {
    const card = document.createElement("section");
    card.className = "card";

    const head = document.createElement("div");
    head.className = "note";
    head.innerHTML = `<span class="label">${note}</span><span class="tag">sub note</span>`;
    card.appendChild(head);

    for (const k of ["major","minor","hminor","mminor"]) {
      const row = document.createElement("div");
      row.className = "row " + k;
      const keys = scales[k].map(x => `<span class="key">${x}</span>`).join("");
      row.innerHTML =
        `<div class="type"><span class="dot ${k}"></span>${LABELS[k]}</div>` +
        `<div class="keys">${keys}</div>`;
      card.appendChild(row);
    }
    grid.appendChild(card);
  }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Best Sub Bass Notes — Cheatsheet</title>
<meta name="description" content="Sub-bass sweet-spot notes, the keys each one fits per scale, and the evidence behind the range. A quick reference for music production. EN / 日本語.">

<style>
  :root {
    --bg: #0f1115;
    --card: #181b22;
    --card-border: #262b36;
    --text: #e6e9ef;
    --muted: #8b93a3;
    --accent: #6ea8fe;
    --sweet: #43c46a;
    --ok: #e0a23a;
    --sub: #e0533a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 2rem 1.25rem 4rem;
    background: radial-gradient(120% 80% at 70% -10%, #1a1d27 0%, var(--bg) 55%);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    line-height: 1.55;
  }
  .wrap { max-width: 1100px; margin: 0 auto; }
  header { margin-bottom: 2rem; }
  .topbar { display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; }
  h1 { font-size: 1.7rem; font-weight: 800; margin: 0 0 .4rem; letter-spacing: .01em; }
  h2 {
    font-size: 1.1rem; font-weight: 700; margin: 2.6rem 0 1rem;
    display: flex; align-items: center; gap: .5rem;
  }
  h2::before { content: ""; width: 4px; height: 1.05em; background: var(--accent); border-radius: 2px; }
  .sub { color: var(--muted); font-size: .92rem; margin: 0; max-width: 64ch; }

  /* ---- language toggle ---- */
  .lang { display: inline-flex; gap: .2rem; border: 1px solid var(--card-border); border-radius: 999px; padding: .2rem; flex: none; }
  .lang button { background: none; border: none; color: var(--muted); font: inherit; font-size: .76rem; font-weight: 700; padding: .22rem .65rem; border-radius: 999px; cursor: pointer; }
  .lang button.active { background: var(--accent); color: #0f1115; }

  /* ---- key reverse-lookup ---- */
  .lookup { display: flex; flex-wrap: wrap; align-items: center; gap: .5rem; margin-bottom: 1.4rem; font-size: .85rem; }
  .lookup-label { color: var(--muted); font-weight: 600; }
  .lookup select, .lookup button {
    background: #20242e; color: var(--text); border: 1px solid #2c3240; border-radius: 8px;
    padding: .35rem .55rem; font: inherit; font-size: .85rem; cursor: pointer;
  }
  .lookup button:hover { border-color: var(--accent); }
  .lookup-summary { color: var(--text); font-weight: 600; font-variant-numeric: tabular-nums; margin-left: .2rem; }

  /* ---- keyboard ---- */
  .kbd-zone { background: var(--card); border: 1px solid var(--card-border); border-radius: 16px; padding: 1.6rem 1.4rem 1.3rem; }
  .keyboard.filtering .white:not(.in-key), .keyboard.filtering .black:not(.in-key) { opacity: .2; }
  .white.in-key, .black.in-key { outline: 3px solid #fff; outline-offset: -3px; }
  .white, .black { cursor: pointer; }

  /* ---- key detail panel ---- */
  .z-sweet { color: var(--sweet); } .z-ok { color: var(--ok); } .z-sub { color: var(--sub); }
  .key-panel { margin-top: 1.5rem; border-top: 1px solid var(--card-border); padding-top: 1.3rem; }
  .kp-title { font-size: 1.3rem; font-weight: 800; margin-bottom: .55rem; }
  .kp-subnotes { font-size: .9rem; color: var(--muted); }
  .kp-subnotes b { font-weight: 800; font-size: 1.05em; }
  .kp-section { font-size: .82rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--text); margin: 1.5rem 0 .7rem; }
  .kp-right > .kp-section:first-of-type { margin-top: 0; }
  .kp-chords { display: grid; grid-template-columns: repeat(auto-fill, minmax(148px, 1fr)); gap: .5rem; align-items: start; }
  .kp-pedal { display: flex; flex-direction: column; gap: .4rem; }
  .pedal-row { display: flex; align-items: baseline; gap: .6rem; font-size: .9rem; }
  .pedal-note { font-weight: 800; min-width: 2.4em; }
  .pedal-chords { color: var(--muted); font-weight: 600; }
  .chord { background: #20242e; border: 1px solid #2c3240; border-radius: 8px; padding: .26rem .55rem; font-size: .92rem; font-weight: 700; font-variant-numeric: tabular-nums; }
  .chord .deg { color: var(--muted); font-size: .72em; font-weight: 700; margin-right: .25rem; text-transform: none; }
  .kp-table { width: 100%; border-collapse: collapse; font-size: .92rem; max-width: 560px; }
  .kp-table th { text-align: left; font-size: .66rem; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); font-weight: 700; padding: .3rem .5rem; border-bottom: 1px solid var(--card-border); }
  .kp-table td { padding: .42rem .5rem; border-bottom: 1px solid #20242e; font-weight: 600; }
  .kp-table td:first-child { font-weight: 800; }
  .kp-table tr.parallel td { opacity: .8; }
  .kp-table .arrow { color: var(--muted); font-weight: 500; font-size: .85em; }
  .kp-table .func { display: inline-block; font-size: .72em; font-weight: 700; letter-spacing: .03em; color: var(--accent); background: rgba(110,168,254,.12); border-radius: 5px; padding: .05rem .3rem; margin-left: .15rem; white-space: nowrap; }
  .kp-note { font-size: .85rem; color: var(--muted); }
  .chord.playable { cursor: pointer; user-select: none; transition: transform .06s, border-color .12s; }
  .chord.playable:hover { border-color: var(--accent); }
  .chord.playable:active, .chord.playing { transform: translateY(1px); border-color: var(--accent); }
  .chord-card { background: #20242e; border: 1px solid #2c3240; border-radius: 9px; padding: .42rem .55rem; cursor: pointer; min-width: 0; transition: transform .06s, border-color .12s; }
  .chord-card:hover { border-color: var(--accent); }
  .chord-card.playing { transform: translateY(1px); border-color: var(--accent); }
  .cc-name { font-size: .98rem; font-weight: 800; }
  .cc-name .deg { color: var(--muted); font-size: .68em; font-weight: 700; margin-right: .15rem; }
  .cc-tones { display: flex; gap: .3rem; margin-top: .32rem; }
  .cc-tones .tn { font-size: .72rem; font-weight: 700; font-variant-numeric: tabular-nums; }
  .cc-tones .tn.tnroot { text-decoration: underline; text-underline-offset: 2px; }
  .cc-slash { display: flex; flex-wrap: wrap; gap: .3rem; margin-top: .32rem; }
  .cc-slash .slash { font-size: .72rem; font-weight: 600; }
  .kp-table tbody tr[data-root] { cursor: pointer; }
  .kp-table tbody tr[data-root]:hover td { background: #20242e; }
  .kp-hint { font-size: .74rem; color: var(--muted); margin-top: .5rem; }
  .kp-secdom { display: flex; flex-wrap: wrap; gap: .7rem; align-items: center; }
  .kp-secdom .sd { display: inline-flex; align-items: center; gap: .35rem; }
  .kp-secdom .sd small { color: var(--muted); font-size: .78em; }
  .kp-homedom { font-size: .86rem; color: var(--muted); margin-top: .7rem; display: flex; align-items: center; gap: .45rem; flex-wrap: wrap; }
  .kp-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 1.6rem; align-items: start; }
  @media (max-width: 760px) { .kp-cols { grid-template-columns: 1fr; gap: 1.2rem; } }
  .kp-basis { margin-left: .5rem; font-weight: 500; color: var(--muted); text-transform: none; letter-spacing: 0; font-size: .92em; }
  .ihelp { display: inline-grid; place-items: center; width: 15px; height: 15px; border-radius: 50%; border: 1px solid var(--muted); background: none; color: var(--muted); font-size: .62rem; font-weight: 800; font-style: normal; line-height: 1; padding: 0; margin-left: .35rem; cursor: pointer; vertical-align: middle; }
  .ihelp:hover { border-color: var(--accent); color: var(--accent); }
  .help-dialog { max-width: 440px; width: calc(100% - 2rem); border: 1px solid var(--card-border); border-radius: 14px; background: var(--card); color: var(--text); padding: 1.3rem 1.4rem; }
  .help-dialog::backdrop { background: rgba(0,0,0,.55); }
  .help-body h3 { margin: 0 0 .6rem; font-size: 1.05rem; }
  .help-body p { margin: 0 0 .7rem; font-size: .9rem; color: #cfd4de; line-height: 1.6; }
  .help-body p:last-child { margin-bottom: 0; }
  .help-actions { margin-top: 1.1rem; text-align: right; }
  .help-close { background: var(--accent); color: #0f1115; border: none; border-radius: 8px; padding: .4rem 1.1rem; font: inherit; font-weight: 700; cursor: pointer; }

  /* ---- collapsible full reference ---- */
  .bykey { margin: 2.6rem 0 0; }
  .bykey > summary { font-size: 1.05rem; font-weight: 700; cursor: pointer; list-style: none; color: var(--text); display: flex; align-items: center; gap: .5rem; }
  .bykey > summary::-webkit-details-marker { display: none; }
  .bykey > summary::before { content: "▸"; color: var(--accent); transition: transform .15s; }
  .bykey[open] > summary::before { transform: rotate(90deg); }
  .keyboard { position: relative; display: flex; gap: 6px; height: 220px; max-width: 720px; margin: 0 auto; }
  .white {
    position: relative; flex: 1; border-radius: 0 0 8px 8px; background: #20242e;
    display: flex; flex-direction: column; justify-content: flex-end; align-items: center;
    padding-bottom: .55rem; color: #0f1115; font-weight: 800;
  }
  .white .name { font-size: 1.25rem; }
  .white .hz { font-size: .68rem; font-weight: 700; opacity: .8; margin-bottom: .15rem; }
  .black {
    position: absolute; top: 0; width: 9%; height: 58%; transform: translateX(-50%);
    border-radius: 0 0 6px 6px; z-index: 2;
    display: flex; flex-direction: column; justify-content: flex-end; align-items: center;
    padding-bottom: .35rem; font-size: .8rem; font-weight: 800; color: #0f1115;
  }
  .black .hz { font-size: .58rem; font-weight: 700; opacity: .85; }
  .sweet { background: var(--sweet); }
  .ok    { background: var(--ok); }
  .sub-z { background: var(--sub); }

  .legend { display: flex; flex-wrap: wrap; gap: 1.1rem; justify-content: center; margin-top: 1.4rem; font-size: .85rem; }
  .legend span { display: inline-flex; align-items: center; gap: .45rem; color: var(--muted); }
  .chip { width: 13px; height: 13px; border-radius: 4px; }

  /* ---- evidence ---- */
  .tips { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; }
  .tip { background: var(--card); border: 1px solid var(--card-border); border-radius: 14px; padding: 1.1rem 1.2rem; border-left: 4px solid var(--accent); }
  .tip h3 { margin: 0 0 .5rem; font-size: .98rem; }
  .tip p { margin: 0 0 .6rem; font-size: .88rem; color: #cfd4de; }
  .tip.sweet-b { border-left-color: var(--sweet); }
  .tip.ok-b { border-left-color: var(--ok); }
  .tip.sub-b { border-left-color: var(--sub); }
  .src { font-size: .78rem; }
  .src a { color: var(--accent); text-decoration: none; }
  .src a:hover { text-decoration: underline; }

  /* ---- scale->key cards ---- */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.1rem; }
  .card { background: var(--card); border: 1px solid var(--card-border); border-radius: 14px; padding: 1.1rem 1.2rem 1.3rem; }
  .note { display: inline-flex; align-items: baseline; gap: .5rem; margin: 0 0 1rem; }
  .note .label { font-size: 1.9rem; font-weight: 800; line-height: 1; }
  .row { margin-bottom: .85rem; }
  .row:last-child { margin-bottom: 0; }
  .type { display: flex; align-items: center; gap: .45rem; font-size: .78rem; font-weight: 600; color: var(--muted); margin-bottom: .45rem; text-transform: uppercase; letter-spacing: .05em; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }
  .dot.major { background: #5db075; } .dot.minor { background: #d98a4b; }
  .dot.hminor { background: #d96aa8; } .dot.mminor { background: #6ea8fe; }
  .dot.dorian { background: #4bb0c0; } .dot.phrygian { background: #e0533a; }
  .dot.lydian { background: #b07ad9; } .dot.mixolydian { background: #e0a23a; }
  .dot.locrian { background: #6e7b99; }
  .mood { font-weight: 500; color: var(--muted); text-transform: none; letter-spacing: 0; margin-left: .45rem; font-size: .9em; }
  .group-label { font-size: .64rem; font-weight: 700; text-transform: uppercase; letter-spacing: .09em; color: var(--muted); margin: .1rem 0 .8rem; padding-top: .85rem; border-top: 1px dashed var(--card-border); }
  .keys { display: flex; flex-wrap: wrap; gap: .4rem; }
  .key { font-size: .85rem; font-weight: 600; padding: .22rem .55rem; border-radius: 7px; background: #20242e; border: 1px solid #2c3240; font-variant-numeric: tabular-nums; }
  .card.zone-sweet { border-top: 3px solid var(--sweet); }
  .card.zone-ok { border-top: 3px solid var(--ok); }
  .zone-tag { font-size: .64rem; font-weight: 800; padding: .12rem .45rem; border-radius: 999px; letter-spacing: .04em; }
  .zone-tag.sweet { background: rgba(67,196,106,.18); color: var(--sweet); }
  .zone-tag.ok { background: rgba(224,162,58,.18); color: var(--ok); }

  /* ---- audio options / kick / slide ---- */
  .audio-opts { display: flex; flex-wrap: wrap; gap: 1.2rem; justify-content: center; margin-top: .8rem; font-size: .8rem; color: var(--muted); }
  .audio-opts label { display: inline-flex; align-items: center; gap: .35rem; cursor: pointer; }
  .audio-opts input { accent-color: var(--accent); }
  .kp-kick { font-size: .85rem; color: var(--muted); margin-top: .45rem; }
  .kp-kick b { font-weight: 800; }
  .kp-live { display: block; font-size: .72rem; font-weight: 600; color: var(--muted); margin-top: .15rem; }
  .kp-slide { font-size: .95rem; font-weight: 700; display: flex; align-items: center; gap: .45rem; flex-wrap: wrap; }
  .kp-slide .sl-step { font-size: .72rem; font-weight: 700; color: var(--muted); background: #20242e; border-radius: 5px; padding: .05rem .35rem; }

  /* ---- sketch loop bar (shared with Polychord Lab) ---- */
  .sketch { position: fixed; left: 0; right: 0; bottom: 0; z-index: 50; background: var(--card); border-top: 1px solid var(--card-border); display: flex; align-items: center; gap: .6rem; padding: .55rem .9rem; flex-wrap: wrap; }
  .sketch .sk-title { font-size: .7rem; font-weight: 800; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); flex: none; }
  .sk-slots { display: flex; gap: .4rem; flex-wrap: wrap; flex: 1; min-width: 0; }
  .sk-slot { display: inline-flex; align-items: center; gap: .3rem; background: #20242e; border: 1px solid #2c3240; border-radius: 8px; padding: .2rem .3rem .2rem .55rem; font-size: .82rem; font-weight: 700; cursor: pointer; font-variant-numeric: tabular-nums; }
  .sk-slot:hover { border-color: var(--accent); }
  .sk-slot.playing { border-color: var(--accent); background: rgba(110,168,254,.15); }
  .sk-slot .sk-x { background: none; border: none; color: var(--muted); font: inherit; font-size: .8em; cursor: pointer; padding: 0 .15rem; }
  .sk-slot .sk-x:hover { color: var(--sub); }
  .sketch input[type=number] { width: 4.2rem; background: #20242e; color: var(--text); border: 1px solid #2c3240; border-radius: 8px; padding: .3rem .4rem; font: inherit; font-size: .82rem; }
  .sketch .sk-btn { background: #20242e; color: var(--text); border: 1px solid #2c3240; border-radius: 8px; padding: .3rem .6rem; font: inherit; font-size: .82rem; font-weight: 700; cursor: pointer; }
  .sketch .sk-btn:hover { border-color: var(--accent); }
  body.has-sketch { padding-bottom: 7.5rem; }

  footer { margin-top: 3rem; color: var(--muted); font-size: .78rem; border-top: 1px solid var(--card-border); padding-top: 1.2rem; }
  footer code { background: #20242e; padding: .05rem .3rem; border-radius: 4px; }
</style>
</head>
<body>
<div class="wrap">
<header>
  <div class="topbar">
    <h1 id="t-h1">Best Sub Bass Notes</h1>
    <div class="lang" id="langToggle">
      <button data-lang="en">EN</button>
      <button data-lang="ja">日本語</button>
    </div>
  </div>
  <p class="sub" id="t-intro"></p>
</header>

<section class="kbd-zone">
  <div class="lookup">
    <span class="lookup-label" id="t-lookupLabel"></span>
    <select id="rootSel" aria-label="root"></select>
    <select id="scaleSel" aria-label="scale"></select>
    <button type="button" id="lookupClear"></button>
  </div>
  <div class="keyboard" id="keyboard"></div>
  <div class="legend" id="legend"></div>
  <div class="audio-opts">
    <label><input type="checkbox" id="optRealOct"><span id="t-realOct"></span></label>
    <label id="octLayerWrap"><input type="checkbox" id="optOctLayer"><span id="t-octLayer"></span></label>
  </div>
  <div class="key-panel" id="keyPanel" hidden></div>
</section>

<details id="byKey" class="bykey">
  <summary id="t-byKeySummary"></summary>
  <p class="sub" id="t-keysIntro" style="margin:.8rem 0 1.2rem"></p>
  <div class="grid" id="grid"></div>
</details>

<h2 id="t-whyH2"></h2>
<div class="tips" id="tips"></div>

<footer id="footer"></footer>
</div>

<dialog id="helpDialog" class="help-dialog">
  <div class="help-body" id="helpBody"></div>
  <form method="dialog" class="help-actions"><button class="help-close" id="helpClose">OK</button></form>
</dialog>

<div class="sketch" id="sketchBar" hidden>
  <span class="sk-title" id="t-sketch"></span>
  <div class="sk-slots" id="skSlots"></div>
  <input type="number" id="skBpm" min="40" max="220" step="1" aria-label="BPM">
  <button class="sk-btn" id="skPlay">▶</button>
  <button class="sk-btn" id="skMidi" draggable="true">⬇ MIDI</button>
  <button class="sk-btn" id="skClear">✕</button>
</div>

<script>
  /* =====================================================================
     i18n strings
     ===================================================================== */
  const STRINGS = {

      panelHomeDom: "Strong dominant of this key (harmonic-minor V)",
      basisMinor: "(based on natural minor)",
      basisParent: (name) => `(based on parent key ${name})`,
      close: "Close",

      lookupLabel: "キーを選択（鍵盤タップでも可）:",
      lookupNone: "—（未選択）",

  /* =====================================================================
     sub-bass keyboard (octave 1, A4=440 equal temperament) — language-neutral
     ===================================================================== */
  const SUB_NOTES = [
    { n:"C",  acc:false, hz:"32.7", zone:"sub-z" },
    { n:"C#", acc:true,  hz:"34.6", zone:"sub-z" },
    { n:"D",  acc:false, hz:"36.7", zone:"ok" },
    { n:"D#", acc:true,  hz:"38.9", zone:"ok" },
    { n:"E",  acc:false, hz:"41.2", zone:"sweet" },
    { n:"F",  acc:false, hz:"43.7", zone:"sweet" },
    { n:"F#", acc:true,  hz:"46.2", zone:"sweet" },
    { n:"G",  acc:false, hz:"49.0", zone:"sweet" },
    { n:"G#", acc:true,  hz:"51.9", zone:"ok" },
    { n:"A",  acc:false, hz:"55.0", zone:"ok" },
    { n:"A#", acc:true,  hz:"58.3", zone:"sub-z" },
    { n:"B",  acc:false, hz:"61.7", zone:"sub-z" },
  ];

  const NOTE_PC = { "C":0, "C#":1, "D":2, "D#":3, "E":4, "F":5, "F#":6, "G":7, "G#":8, "A":9, "A#":10, "B":11 };
  const ROOT_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];

  (function buildKeyboard() {
    const keyboard = document.getElementById("keyboard");
    const whites = SUB_NOTES.filter(x => !x.acc);
    const totalWhite = whites.length;
    whites.forEach(w => {
      const el = document.createElement("div");
      el.className = "white " + w.zone;
      el.dataset.pc = NOTE_PC[w.n];
      el.innerHTML = `<span class="hz">${w.hz}</span><span class="name">${w.n}</span>`;
      keyboard.appendChild(el);
    });
    SUB_NOTES.forEach((note, i) => {
      if (!note.acc) return;
      const leftWhite = SUB_NOTES.slice(0, i).filter(x => !x.acc).length;
      const el = document.createElement("div");
      el.className = "black " + note.zone;
      el.dataset.pc = NOTE_PC[note.n];
      el.style.left = (leftWhite / totalWhite) * 100 + "%";
      el.innerHTML = `<span class="name">${note.n}</span><span class="hz">${note.hz}</span>`;
      keyboard.appendChild(el);
    });
  })();

  /* =====================================================================
     scale -> key (computed from scale formulas; pitch classes C=0 ... B=11)
     ===================================================================== */
  const MAJOR_NAMES = ["C","D♭","D","E♭","E","F","F#","G","A♭","A","B♭","B"];
  const MINOR_NAMES = ["C","C#","D","E♭","E","F","F#","G","G#","A","B♭","B"];
  const FIFTHS = [0,7,2,9,4,11,6,1,8,3,10,5];           // circle of fifths -> simple keys first
  const RANK = {}; FIFTHS.forEach((pc, i) => { RANK[pc] = i; });

  // core scales kept on top (Major/Minor for early writing); modes added below
  const SCALES = [
    { key:"major",      label:"major",          group:"core", mood:{en:"bright",         ja:"明るい"},         pat:[0,2,4,5,7,9,11], names:MAJOR_NAMES },
    { key:"minor",      label:"minor",          group:"core", mood:{en:"dark",           ja:"暗い"},           pat:[0,2,3,5,7,8,10], names:MINOR_NAMES },
    { key:"hminor",     label:"harmonic minor", group:"core", mood:{en:"tense",          ja:"緊張感"},         pat:[0,2,3,5,7,8,11], names:MINOR_NAMES },
    { key:"mminor",     label:"melodic minor",  group:"core", mood:{en:"jazzy",          ja:"ジャジー"},       pat:[0,2,3,5,7,9,11], names:MINOR_NAMES },
    { key:"dorian",     label:"Dorian",         group:"mode", mood:{en:"hip minor",      ja:"洒落たマイナー"},   pat:[0,2,3,5,7,9,10], names:MINOR_NAMES },
    { key:"phrygian",   label:"Phrygian",       group:"mode", mood:{en:"dark / Spanish", ja:"暗い・スパニッシュ"}, pat:[0,1,3,5,7,8,10], names:MINOR_NAMES },
    { key:"lydian",     label:"Lydian",         group:"mode", mood:{en:"airy / dreamy",  ja:"浮遊感"},         pat:[0,2,4,6,7,9,11], names:MAJOR_NAMES },
    { key:"mixolydian", label:"Mixolydian",     group:"mode", mood:{en:"loose major",    ja:"緩い明るさ"},      pat:[0,2,4,5,7,9,10], names:MAJOR_NAMES },
    { key:"locrian",    label:"Locrian",        group:"mode", mood:{en:"unstable",       ja:"不安定・実験的"},   pat:[0,1,3,5,6,8,10], names:MINOR_NAMES },
  ];

  const SUB = [
    { n:"D",  pc:2, zone:"ok"    },
    { n:"D#", pc:3, zone:"ok"    },
    { n:"E",  pc:4, zone:"sweet" },
    { n:"F",  pc:5, zone:"sweet" },
    { n:"F#", pc:6, zone:"sweet" },
    { n:"G",  pc:7, zone:"sweet" },
    { n:"G#", pc:8, zone:"ok"    },
    { n:"A",  pc:9, zone:"ok"    },
  ];

  function keysContaining(pc, scale) {
    return scale.pat
      .map(iv => ((pc - iv) % 12 + 12) % 12)
      .sort((a, b) => RANK[a] - RANK[b])
      .map(t => scale.names[t]);
  }

  /* =====================================================================
     render (re-runs on language change)
     ===================================================================== */
  function buildGrid(lang) {
    const s = STRINGS[lang];
    const grid = document.getElementById("grid");
    grid.innerHTML = "";
    for (const sub of SUB) {
      const card = document.createElement("section");
      card.className = "card zone-" + sub.zone;
      card.innerHTML =
        `<div class="note"><span class="label">${sub.n}</span>` +
        `<span class="zone-tag ${sub.zone}">${s.zone[sub.zone]}</span></div>`;
      let modeDividerDone = false;
      for (const scale of SCALES) {
        if (scale.group === "mode" && !modeDividerDone) {
          const div = document.createElement("div");
          div.className = "group-label";
          div.textContent = s.modesDivider;
          card.appendChild(div);
          modeDividerDone = true;
        }
        const keys = keysContaining(sub.pc, scale)
          .map(x => `<span class="key">${x}</span>`).join("");
        const row = document.createElement("div");
        row.className = "row " + scale.key;
        const mood = scale.mood[lang] ? `<span class="mood">${scale.mood[lang]}</span>` : "";
        row.innerHTML =
          `<div class="type"><span class="dot ${scale.key}"></span>${scale.label}${mood}</div>` +
          `<div class="keys">${keys}</div>`;
        card.appendChild(row);
      }
      grid.appendChild(card);
    }
  }

  function buildTips(lang) {
    const tips = document.getElementById("tips");
    tips.innerHTML = "";
    for (const t of TIPS) {
      const el = document.createElement("div");
      el.className = "tip" + (t.cls ? " " + t.cls : "");
      el.innerHTML =
        `<h3>${t[lang].h}</h3><p>${t[lang].p}</p>` +

  /* ---- key reverse-lookup + modulation panel ---- */
  let CURRENT_LANG = "en";
  const rootSel = document.getElementById("rootSel");
  const scaleSel = document.getElementById("scaleSel");
  const lookupClear = document.getElementById("lookupClear");
  const kbEl = document.getElementById("keyboard");
  const panelEl = document.getElementById("keyPanel");

  const CHORD_NAMES = MINOR_NAMES;
  const MAJOR = SCALES.find(s => s.key === "major");
  const MINOR = SCALES.find(s => s.key === "minor");
  const PC_ZONE = {};
  SUB_NOTES.forEach(n => { PC_ZONE[NOTE_PC[n.n]] = n.zone; });   // "sweet" | "ok" | "sub-z"
  const HZ1 = {};
  SUB_NOTES.forEach(n => { HZ1[NOTE_PC[n.n]] = parseFloat(n.hz); });
  const LIVE_SCALE = { major:"Major", minor:"Minor", hminor:"Harmonic Minor", mminor:"Melodic Minor",
    dorian:"Dorian", phrygian:"Phrygian", lydian:"Lydian", mixolydian:"Mixolydian", locrian:"Locrian" };
  const ZONE_RANK = { sweet: 0, ok: 1, "sub-z": 2 };
  const ZONE_CLASS = { sweet: "z-sweet", ok: "z-ok", "sub-z": "z-sub" };
  const ZONE_MARK = { sweet: "🟢", ok: "🟡", "sub-z": "🔴" };
  const pcMod = n => ((n % 12) + 12) % 12;

  // build option lists once
  const noneOpt = document.createElement("option");
  noneOpt.value = "";
  rootSel.appendChild(noneOpt);
  ROOT_NAMES.forEach((n, pc) => {
    const o = document.createElement("option");
    o.value = pc; o.textContent = n;
    rootSel.appendChild(o);
  });
  rootSel.value = "";
  SCALES.forEach((sc, i) => {
    const o = document.createElement("option");
    o.value = i; o.textContent = sc.label;
    scaleSel.appendChild(o);
  });

  // ---- music-theory helpers ----
  function scaleTriads(tonicPc, scale) {
    const pcs = scale.pat.map(iv => pcMod(tonicPc + iv));
    const out = [];
    for (let d = 0; d < 7; d++) {
      const r = pcs[d], third = pcs[(d + 2) % 7], fifth = pcs[(d + 4) % 7];
      const i3 = pcMod(third - r), i5 = pcMod(fifth - r);
      let qual = "?";
      if (i3 === 4 && i5 === 7) qual = "maj";
      else if (i3 === 3 && i5 === 7) qual = "min";
      else if (i3 === 3 && i5 === 6) qual = "dim";
      else if (i3 === 4 && i5 === 8) qual = "aug";
      out.push({ deg: d, root: r, qual });
    }
    return out;
  }
  function roman(deg, qual) {
    const base = ["I","II","III","IV","V","VI","VII"][deg];
    if (qual === "maj") return base;
    if (qual === "aug") return base + "+";
    if (qual === "min") return base.toLowerCase();
    if (qual === "dim") return base.toLowerCase() + "°";
    return base;
  }
  function chordLabel(t) {
    const suf = t.qual === "min" ? "m" : t.qual === "dim" ? "dim" : t.qual === "aug" ? "aug" : "";
    return CHORD_NAMES[t.root] + suf;
  }
  function relatedKeys(homePc, homeScale) {
    return scaleTriads(homePc, homeScale)
      .filter(t => t.deg !== 0 && (t.qual === "maj" || t.qual === "min"))
      .map(t => ({ tonicPc: t.root, scale: t.qual === "maj" ? MAJOR : MINOR, homeDeg: t.deg, homeQual: t.qual }));
  }
  // best pivot (common diatonic chord); prefer pre-dominant (IV/ii) in target, avoid V/vii
  function bridge(homePc, homeScale, targetPc, targetScale) {
    const H = scaleTriads(homePc, homeScale), T = scaleTriads(targetPc, targetScale);
    const common = [];
    for (const h of H) {
      if (h.qual !== "maj" && h.qual !== "min") continue;
      const tt = T.find(x => x.root === h.root && x.qual === h.qual);
      if (tt) common.push({ root: h.root, qual: h.qual, homeDeg: h.deg, targetDeg: tt.deg });
    }
    if (!common.length) return null;
    const pref = { 3: 0, 1: 1, 5: 2, 2: 3, 0: 4, 6: 8, 4: 9 };
    common.sort((a, b) => (pref[a.targetDeg] ?? 5) - (pref[b.targetDeg] ?? 5));
    return common[0];
  }
  // harmonic function by scale degree (T=tonic, S=subdominant, D=dominant)
  const FUNC = {
    major: { 0:"T", 1:"S", 2:"T", 3:"S", 4:"D", 5:"T", 6:"D" },
    minor: { 0:"T", 1:"S", 2:"T", 3:"S", 4:"D", 5:"S", 6:"D" },
  };
  const funcOf = (scale, deg) => FUNC[scale.key === "major" ? "major" : "minor"][deg];
  const bridgeText = (b, s, homeScale, targetScale, pivotName) => b
    ? `${pivotName} <span class="arrow">(${roman(b.homeDeg, b.qual)}→${roman(b.targetDeg, b.qual)})</span>` +
      ` <span class="func">${funcOf(homeScale, b.homeDeg)}→${funcOf(targetScale, b.targetDeg)}</span>`
    : s.panelBorrow;

  // chord intervals (semitones from root) for playback & chips
  const TRIAD_IV = { maj: [0,4,7], min: [0,3,7], dim: [0,3,6], aug: [0,4,8] };
  function chordChip(rootPc, iv, label, degLabel, zoneClass) {
    const deg = degLabel ? `<span class="deg">${degLabel}</span>` : "";
    const lab = zoneClass ? `<span class="${zoneClass}">${label}</span>` : label;
    return `<span class="chord playable" data-root="${rootPc}" data-iv="${iv.join(",")}">${deg}${lab}</span>`;
  }

  // ---- diatonic note spelling (correct letter names per key) ----
  const LETTERS = ["C","D","E","F","G","A","B"];
  const LETTER_PC = [0,2,4,5,7,9,11];
  function parseNote(name) {
    const letter = LETTERS.indexOf(name[0]);
    let acc = 0;
    for (const ch of name.slice(1)) { if (ch === "#") acc++; else if (ch === "♭" || ch === "b") acc--; }
    return { letter, acc };
  }
  const accStr = a => a === 0 ? "" : a > 0 ? "#".repeat(a) : "♭".repeat(-a);
  function spellPc(pc, letterIndex) {
    let d = ((pc - LETTER_PC[letterIndex]) % 12 + 12) % 12;
    if (d > 6) d -= 12;
    return LETTERS[letterIndex] + accStr(d);
  }
  function spellScale(tonicName, pat) {
    const { letter, acc } = parseNote(tonicName);
    const tonicPc = pcMod(LETTER_PC[letter] + acc);
    return pat.map((iv, i) => spellPc(pcMod(tonicPc + iv), (letter + i) % 7));
  }
  const fifthName = tonicName => {
    const { letter, acc } = parseNote(tonicName);
    return spellPc(pcMod(LETTER_PC[letter] + acc + 7), (letter + 4) % 7);
  };
  const qualSuffix = q => q === "min" ? "m" : q === "dim" ? "dim" : q === "aug" ? "aug" : "";

  // chord card: diatonic spelling, tones coloured by sub zone + slash (inversion) options
  function chordCard(deg, qual, spelled, scalePcs) {
    const idx = [deg, (deg + 2) % 7, (deg + 4) % 7];
    const name = spelled[deg] + qualSuffix(qual);
    const rootPc = scalePcs[deg];
    const ivs = TRIAD_IV[qual] || [0,4,7];
    const strip = idx.map((di, i) =>
      `<span class="tn ${ZONE_CLASS[PC_ZONE[scalePcs[di]]]}${i === 0 ? " tnroot" : ""}">${spelled[di]}</span>`).join("");
    const slash = idx.slice(1).filter(di => PC_ZONE[scalePcs[di]] !== "sub-z")
      .map(di => `<span class="slash ${ZONE_CLASS[PC_ZONE[scalePcs[di]]]}">${name}/${spelled[di]}</span>`).join("");
    return `<div class="chord-card playable" data-root="${rootPc}" data-iv="${ivs.join(",")}">` +
      `<div class="cc-name"><span class="deg">${roman(deg, qual)}</span> <span class="${ZONE_CLASS[PC_ZONE[rootPc]]}">${name}</span></div>` +
      `<div class="cc-tones">${strip}</div>` +
      (slash ? `<div class="cc-slash">${slash}</div>` : "") +
      `</div>`;
  }

  // ---- Web Audio: play a chord (mid register triad + soft sub root) ----
  let actx = null;
  function audio() {
    try {
      if (!actx) { const C = window.AudioContext || window.webkitAudioContext; if (!C) return null; actx = new C(); }
      if (actx.state === "suspended") actx.resume();
      return actx;
    } catch (e) { return null; }
  }
  const midiFreq = m => 440 * Math.pow(2, (m - 69) / 12);

  // audition options: real sub octave (octave 1) + optional +1 oct layer
  let REAL_OCT = load("subbass-realoct") === "1";
  let OCT_LAYER = load("subbass-octlayer") !== "0";
  function syncAudioOpts() {
    const r = document.getElementById("optRealOct"), l = document.getElementById("optOctLayer");
    r.checked = REAL_OCT; l.checked = OCT_LAYER; l.disabled = !REAL_OCT;
    document.getElementById("octLayerWrap").style.opacity = REAL_OCT ? "1" : ".45";
  }
  document.getElementById("optRealOct").addEventListener("change", e => {
    REAL_OCT = e.target.checked; store("subbass-realoct", REAL_OCT ? "1" : "0"); syncAudioOpts();
  });
  document.getElementById("optOctLayer").addEventListener("change", e => {
    OCT_LAYER = e.target.checked; store("subbass-octlayer", OCT_LAYER ? "1" : "0");
  });
  syncAudioOpts();

  // canonical chord = mid-register triad + sub root at the REAL octave 1 (+ optional oct-up layer).
  // Stored / exported as real pitches; audition lifts the sub when REAL_OCT is off.
  function buildChordMids(rootPc, iv) {
    const base = 48 + rootPc;                  // triad root in C3–B3
    const mids = iv.map(x => base + x);
    mids.push(24 + rootPc);                    // sub root at octave 1 (C1=24)
    if (OCT_LAYER) mids.push(36 + rootPc);     // octave-up layer
    return mids;
  }
  function playMids(mids, dur = 1.4) {
    const ac = audio(); if (!ac) return;
    // when real-octave audition is off, lift sub notes an octave (laptop speakers)
    const ms = [...new Set(REAL_OCT ? mids : mids.map(m => m < 36 ? m + 12 : m))];
    if (!ms.length) return;
    try {
      const t0 = ac.currentTime, peak = 0.16;
      const master = ac.createGain();
      const lp = ac.createBiquadFilter(); lp.type = "lowpass"; lp.frequency.value = 2600;
      master.connect(lp); lp.connect(ac.destination);
      master.gain.setValueAtTime(0.0001, t0);
      master.gain.exponentialRampToValueAtTime(peak, t0 + 0.02);
      master.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
      const lowest = Math.min(...ms);
      ms.forEach(m => {
        const isReal = REAL_OCT && m < 36;     // true sub: sine, full level
        const o = ac.createOscillator(); o.type = isReal ? "sine" : "triangle"; o.frequency.value = midiFreq(m);
        const g = ac.createGain();
        g.gain.value = isReal ? 1.0 : (m === lowest ? 0.45 : (m < 48 ? 0.4 : 1));
        o.connect(g); g.connect(master); o.start(t0); o.stop(t0 + dur + 0.05);
      });
    } catch (e) {}
  }

  // ---- modulation basis (modes -> parent major; harmonic/melodic minor -> natural minor) ----
  const MODE_PARENT_OFFSET = { dorian: 2, phrygian: 4, lydian: 5, mixolydian: 7, locrian: 11 };
  function modBasis(tonicPc, scale) {
    if (scale.key === "major") return { pc: tonicPc, scale: MAJOR, note: null };
    if (scale.key === "minor") return { pc: tonicPc, scale: MINOR, note: null };
    if (scale.key === "hminor" || scale.key === "mminor") return { pc: tonicPc, scale: MINOR, note: "minor" };
    const off = MODE_PARENT_OFFSET[scale.key];
    if (off != null) return { pc: pcMod(tonicPc - off), scale: MAJOR, note: "parent" };
    return { pc: tonicPc, scale: MAJOR, note: null };
  }

  // ---- help (ⓘ) ----
  const helpBtn = (topic) => `<button type="button" class="ihelp" data-help="${topic}" aria-label="help">i</button>`;
  const HELP = {
    en: {
      zone: `<h3>Sub-bass zones</h3><p>Each note is coloured by how well it works as a <b>sub-bass root</b>:</p><p><b class="z-sweet">Green = sweet spot</b> (E1–G#1, ~41–52Hz) — strong on any system.<br><b class="z-ok">Yellow = solid</b> (D / D# / G# / A) — usable.<br><b class="z-sub">Red = suboptimal</b> — tends to vanish or sound weak.</p><p>So a chord shown in green has a root that gives you a powerful sub.</p>`,
      voicing: `<h3>Chords & sub-friendly bass</h3><p>Each card shows the chord's tones coloured by sub zone (<b class="z-sweet">green</b> sweet / <b class="z-ok">yellow</b> solid / <b class="z-sub">red</b> weak); the underlined one is the root.</p><p>You can keep the chord but put a different chord tone in the <b>bass / sub</b> — an inversion (slash chord) — so the low end lands in the sweet spot. Example: <b>C</b>'s root C is weak, but <b>C/G</b> or <b>C/E</b> puts a strong sub under the same chord.</p><p>The listed slashes are the chord tones that give a good sub. Pick by ear — the sound is what matters.</p>`,
      bridge: `<h3>Bridge (pivot chord)</h3><p>A <b>pivot chord</b> exists in <b>both</b> keys, so it works as a hinge to slip between them.</p><p>The numbers are its degree in each key; the badge is its harmonic <b>function</b>: <b>T</b> = tonic (stable / home), <b>S</b> = subdominant (departure), <b>D</b> = dominant (tension). A pivot feels smooth when its function makes sense in <b>both</b> keys.</p><p>Example C→G: <b>Em</b> is <b>iii (T)</b> in C and <b>vi (T)</b> in G — tonic in both, so the change is invisible. Then <b>D7</b> (G's dominant) drives the landing.</p>`,
      secdom: `<h3>Strong approach — secondary dominant (V7)</h3><p>Every key has one chord that <b>pulls strongly toward it</b>: its <b>V7</b> (dominant 7th).</p><p>Play the target's V7 right before it for a strong, obvious change. Example: to land on <b>F# major</b>, play <b>C#7 → F#</b>.</p><p>Versus a pivot (smooth, unnoticed), this is the <b>bold, dramatic</b> way in. Same destination.</p>`,
      homedom: `<h3>Strong dominant (harmonic-minor V)</h3><p>In natural minor the V chord is minor and feels weak. Borrowing from <b>harmonic minor</b> makes it a <b>major V7</b>, which resolves much more strongly to the tonic.</p><p>Example in A minor: <b>E7 → Am</b> for a strong cadence.</p>`,
      pedal: `<h3>Pedal / drone sub</h3><p>A sub note that is a chord tone of several chords can be <b>held underneath</b> while the chords change above — a pedal (drone) bass, very common in techno / IDM.</p><p>This lists each sweet / solid sub note in the key and the chords you can keep it under. Example (A♭ major): hold <b>E♭</b> and play A♭/E♭ → Cm/E♭ → E♭ without moving the sub.</p>`,
      kick: `<h3>Kick tuning</h3><p>In club music the kick's fundamental is usually tuned to the key — most often the <b>root</b>, sometimes the <b>5th</b>.</p><p>The two numbers are the fundamental in octave 1 / octave 2. Pick the octave that puts the kick where you want it: share the sub's zone (~40–60Hz) for a fused low end, or sit an octave apart so kick and sub stay separated.</p>`,
      slide: `<h3>808 slides</h3><p>For glide / portamento basslines: the usable sub notes of this key in pitch order, with the distance between neighbours in semitones.</p><p>Short slides (1–3 semitones) keep the bass punchy; for bigger jumps an octave move usually sounds more stable than a long glide.</p>`,
    },
    ja: {
      zone: `<h3>サブ域の色分け</h3><p>各音を「<b>サブベースのルートとしての相性</b>」で色分けしています。</p><p><b class="z-sweet">緑＝スイートスポット</b>（E1–G#1, 約41–52Hz）— どの環境でも強く鳴る。<br><b class="z-ok">黄＝ソリッド</b>（D / D# / G# / A）— 使える。<br><b class="z-sub">赤＝弱い</b> — 消えやすい・弱く聞こえがち。</p><p>つまり緑のコードはルートに太いサブを置けます。</p>`,
      voicing: `<h3>コードとサブ向きの低音</h3><p>各カードはコードの構成音をサブ域の色で表示（<b class="z-sweet">緑</b>=スイート／<b class="z-ok">黄</b>=ソリッド／<b class="z-sub">赤</b>=弱い）。下線付きがルートです。</p><p>コードはそのままで、<b>低音(サブ)だけ別の構成音</b>に回す＝転回形（スラッシュコード）にすると、低域をスイートスポットに置けます。例：<b>C</b>はルートCが弱いが、<b>C/G</b> や <b>C/E</b> なら同じコードで太いサブ。</p><p>併記のスラッシュは“サブが良くなる低音”の候補。最後は耳で選んでください。</p>`,
      bridge: `<h3>ブリッジ（ピボットコード）</h3><p><b>ピボットコード</b>は今のキーと行き先の<b>両方に存在する</b>和音。これを“蝶番”にして転調します。</p><p>数字は各キーでの度数、バッジは和音<b>機能</b>：<b>T</b>＝トニック（安定・home）／<b>S</b>＝サブドミナント（出発）／<b>D</b>＝ドミナント（緊張）。<b>両方のキーで機能が筋の通る</b>ピボットほど滑らかです。</p><p>例 C→G：<b>Em</b> は Cで <b>IIIm (T)</b>、Gで <b>VIm (T)</b> ＝両方トニックなので気づかれず移れる。続く <b>D7</b>（Gのドミナント）で着地。</p>`,
      secdom: `<h3>強い導入 — セカンダリードミナント（V7）</h3><p>どのキーにも、そのキーへ<b>強く引っ張る</b>専用の和音＝<b>V7</b>（ドミナントセブンス）があります。</p><p>行き先の直前にその V7 を鳴らすと、はっきり強く転調できます。例：<b>F# major</b> に着地したいなら <b>C#7 → F#</b>。</p><p>ピボット（滑らか・気づかれない）に対し、これは<b>はっきり劇的</b>な入り方。行き先は同じです。</p>`,
      homedom: `<h3>強い属和音（harmonic minor の V）</h3><p>ナチュラルマイナーのVは“マイナー”で弱め。<b>harmonic minor</b> から借りるとVが<b>メジャーのV7</b>になり、主和音へ強く解決します。</p><p>例（A minor）：<b>E7 → Am</b> で強いケイデンス。</p>`,
      pedal: `<h3>ペダル（ドローン）サブ</h3><p>複数のコードの構成音になっているサブ音は、上のコードを変えながら<b>下で保持</b>できます＝ペダル(ドローン)ベース。テクノ/IDMで頻出。</p><p>ここではキー内の各スイート/ソリッドのサブ音と、その音を下に保てるコードを一覧。例（A♭ major）：<b>E♭</b> を保持して A♭/E♭ → Cm/E♭ → E♭ とサブを動かさず進める。</p>`,
      kick: `<h3>キックの基音</h3><p>クラブミュージックではキックの基音をキーに合わせるのが定石。多くは<b>ルート</b>、ときどき<b>5度</b>。</p><p>数値はオクターブ1／2での基音周波数。サブと同じ帯域（約40–60Hz）で溶け合わせるか、1オクターブ離して住み分けるか、置きたい帯域に合わせてオクターブを選びます。</p>`,
      slide: `<h3>808スライド</h3><p>グライド（ポルタメント）ベース用に、このキーで使えるサブ音を音高順に並べ、隣同士の半音距離を表示。</p><p>1–3半音の短いスライドはアタック感を保ちやすく、大きい跳躍は長いグライドよりオクターブ移動の方が安定します。</p>`,
    },
  };
  function openHelp(topic) {
    const body = document.getElementById("helpBody");
    body.innerHTML = (HELP[CURRENT_LANG] && HELP[CURRENT_LANG][topic]) || "";
    const d = document.getElementById("helpDialog");
    if (d.showModal) d.showModal(); else d.setAttribute("open", "");
  }

  // ---- panel render ----
  function renderPanel(homePc, homeScale, lang) {
    const s = STRINGS[lang];
    const scalePcs = homeScale.pat.map(iv => pcMod(homePc + iv));
    const spelled = spellScale(homeScale.names[homePc], homeScale.pat);
    const pcName = {}; scalePcs.forEach((pc, i) => { pcName[pc] = spelled[i]; });
    const inKey = new Set(scalePcs);
    const sweet = SUB.filter(x => x.zone === "sweet" && inKey.has(x.pc)).map(x => pcName[x.pc]);
    const solid = SUB.filter(x => x.zone === "ok" && inKey.has(x.pc)).map(x => pcName[x.pc]);

    const basis = modBasis(homePc, homeScale);
    let basisNote = "";
    if (basis.note === "minor") basisNote = s.basisMinor;
    else if (basis.note === "parent") basisNote = s.basisParent(basis.scale.names[basis.pc] + " major");
    const minorFamily = homeScale.key === "minor" || homeScale.key === "hminor" || homeScale.key === "mminor";

    // ----- left column: sub notes + kick tuning + chords -----
    const fifthPc = pcMod(homePc + 7);
    const kpName = pc => pcName[pc] || ROOT_NAMES[pc];
    const hzPair = pc => `${HZ1[pc].toFixed(1)} / ${(HZ1[pc] * 2).toFixed(1)}Hz`;
    let left =
      `<div class="kp-subnotes">${s.panelSubNotes}: ` +
      `<b class="z-sweet">${sweet.join(" ") || "—"}</b>　·　<b class="z-ok">${solid.join(" ") || "—"}</b></div>` +
      `<div class="kp-kick">🥁 ${s.panelKick} ${helpBtn("kick")}: ` +
      `<b class="${ZONE_CLASS[PC_ZONE[homePc]]}">${kpName(homePc)}</b> ${hzPair(homePc)}　·　` +
      `<b class="${ZONE_CLASS[PC_ZONE[fifthPc]]}">${kpName(fifthPc)}</b> <small>(${s.kick5th})</small> ${hzPair(fifthPc)}</div>` +
      `<div class="kp-section">${s.panelChords} ${helpBtn("voicing")}</div><div class="kp-chords">`;
    const triads = scaleTriads(homePc, homeScale);
    for (const t of triads) left += chordCard(t.deg, t.qual, spelled, scalePcs);
    left += `</div><div class="kp-hint">${s.hintPlay}</div>`;

    // pedal: each good sub note + the diatonic chords you can hold it under
    const pedal = scalePcs.map((pc, si) => ({ pc, si, zone: PC_ZONE[pc] }))
      .filter(x => x.zone !== "sub-z")
      .sort((a, b) => ZONE_RANK[a.zone] - ZONE_RANK[b.zone]);
    if (pedal.length) {
      left += `<div class="kp-section">${s.panelPedal} ${helpBtn("pedal")}</div><div class="kp-pedal">`;
      for (const p of pedal) {
        const degs = [p.si, (p.si + 5) % 7, (p.si + 3) % 7].sort((a, b) => a - b);
        const chords = degs.map(d => spelled[d] + qualSuffix(triads[d].qual)).join("　");
        left += `<div class="pedal-row"><span class="pedal-note ${ZONE_CLASS[p.zone]}">${spelled[p.si]}</span>` +
          `<span class="pedal-chords">${chords}</span></div>`;
      }
      left += `</div>`;
    }

    // 808 slides: usable sub notes in pitch order with semitone distances
    const slide = [...pedal].sort((a, b) => a.pc - b.pc);
    if (slide.length > 1) {
      left += `<div class="kp-section">${s.panelSlide} ${helpBtn("slide")}</div><div class="kp-slide">` +
        slide.map((p, i) =>
          (i ? `<span class="sl-step">+${p.pc - slide[i - 1].pc}</span>` : "") +
          `<b class="${ZONE_CLASS[p.zone]}">${spelled[p.si]}</b>`).join("") +
        `</div>`;
    }

    // ----- right column: modulation + secondary dominants + home dominant -----
    const rel = relatedKeys(basis.pc, basis.scale)
      .sort((a, b) => (ZONE_RANK[PC_ZONE[a.tonicPc]] - ZONE_RANK[PC_ZONE[b.tonicPc]]) || (a.homeDeg - b.homeDeg));
    const targets = rel.slice();
    if (!basis.note) {  // major/minor selected -> add parallel key
      targets.push({ tonicPc: basis.pc, scale: basis.scale === MAJOR ? MINOR : MAJOR, parallel: true });
    }
    let right = `<div class="kp-section">${s.panelModulate} ${helpBtn("bridge")}` +
      (basisNote ? `<span class="kp-basis">${basisNote}</span>` : "") + `</div>` +
      `<table class="kp-table"><thead><tr><th>${s.thKey}</th><th>${s.thDeg}</th><th>${s.thSub}</th><th>${s.thBridge}</th></tr></thead><tbody>`;
    const basisSpelled = spellScale(basis.scale.names[basis.pc], basis.scale.pat);
    for (const r of targets) {
      const z = PC_ZONE[r.tonicPc];
      const b = bridge(basis.pc, basis.scale, r.tonicPc, r.scale);
      const deg = r.parallel ? s.parallelTag : roman(r.homeDeg, r.homeQual);
      const keyName = (r.parallel ? homeScale.names[homePc] : r.scale.names[r.tonicPc]) + " " + r.scale.label;
      const pivotName = b ? basisSpelled[b.homeDeg] + qualSuffix(b.qual) : "";
      right += `<tr data-root="${r.tonicPc}" data-scale="${r.scale.key}"${r.parallel ? ' class="parallel"' : ''}>` +
        `<td class="${ZONE_CLASS[z]}">${keyName}</td>` +
        `<td>${deg}</td><td>${ZONE_MARK[z]}</td><td>${bridgeText(b, s, basis.scale, r.scale, pivotName)}</td></tr>`;
    }
    right += `</tbody></table><div class="kp-hint">${s.hintJump}</div>`;

    right += `<div class="kp-section">${s.panelSecDom} ${helpBtn("secdom")}</div><div class="kp-secdom">`;
    for (const r of rel) {
      const v = pcMod(r.tonicPc + 7);
      right += `<span class="sd">` + chordChip(v, [0,4,7,10], fifthName(r.scale.names[r.tonicPc]) + "7", "", "") +
        `<small>→ ${r.scale.names[r.tonicPc]} ${r.scale.label}</small></span>`;
    }
    right += `</div>`;

    if (minorFamily) {
      const v = pcMod(homePc + 7);
      right += `<div class="kp-homedom">${s.panelHomeDom} ${helpBtn("homedom")}: ` +
        chordChip(v, [0,4,7,10], fifthName(homeScale.names[homePc]) + "7", "", "") + `</div>`;
    }

    panelEl.innerHTML =
      `<div class="kp-title">${homeScale.names[homePc]} ${homeScale.label}` +
      `<span class="kp-live">${s.live(homeScale.names[homePc], LIVE_SCALE[homeScale.key])}</span></div>` +
      `<div class="kp-cols"><div class="kp-left">${left}</div><div class="kp-right">${right}</div></div>`;
    panelEl.hidden = false;
  }

  // ---- URL + persistence (minimise re-selection) ----
  function updateURL(pc, scaleKey) {
    try {
      const u = new URL(window.location.href);
      if (pc == null) { u.searchParams.delete("root"); u.searchParams.delete("scale"); }
      else { u.searchParams.set("root", ROOT_NAMES[pc]); u.searchParams.set("scale", scaleKey); }
      history.replaceState(null, "", u);
    } catch (e) {}
  }

  function applyLookup() {
    if (rootSel.value === "") {
      kbEl.classList.remove("filtering");
      kbEl.querySelectorAll(".in-key").forEach(e => e.classList.remove("in-key"));
      panelEl.hidden = true; panelEl.innerHTML = "";
      updateURL(null); store("subbass-key", "");
      return;
    }
    const pc = +rootSel.value;
    const scale = SCALES[+scaleSel.value];
    const set = new Set(scale.pat.map(iv => pcMod(pc + iv)));
    kbEl.classList.add("filtering");
    kbEl.querySelectorAll("[data-pc]").forEach(e => e.classList.toggle("in-key", set.has(+e.dataset.pc)));
    renderPanel(pc, scale, CURRENT_LANG);
    updateURL(pc, scale.key);
    store("subbass-key", rootSel.value + "|" + scaleSel.value);
  }

  function buildLookupOptions(lang) {
    noneOpt.textContent = STRINGS[lang].lookupNone;
    document.getElementById("t-lookupLabel").textContent = STRINGS[lang].lookupLabel;
    lookupClear.textContent = STRINGS[lang].lookupClear;
  }

  rootSel.addEventListener("change", applyLookup);
  scaleSel.addEventListener("change", applyLookup);
  lookupClear.addEventListener("click", () => { rootSel.value = ""; applyLookup(); });
  kbEl.addEventListener("click", e => {
    const key = e.target.closest("[data-pc]");
    if (!key) return;
    rootSel.value = String(key.dataset.pc);
    applyLookup();
  });
  panelEl.addEventListener("click", e => {
    const help = e.target.closest(".ihelp");
    if (help) { openHelp(help.dataset.help); return; }
    const chip = e.target.closest(".playable");
    if (chip) {
      const mids = buildChordMids(+chip.dataset.root, chip.dataset.iv.split(",").map(Number));
      if (e.shiftKey) { sketchAdd(chipLabel(chip), mids); return; }
      playMids(mids);
      chip.classList.add("playing");
      setTimeout(() => chip.classList.remove("playing"), 140);
      return;
    }
    const tr = e.target.closest("tr[data-root]");
    if (tr) {
      rootSel.value = tr.dataset.root;
      const si = SCALES.findIndex(x => x.key === tr.dataset.scale);
      if (si >= 0) scaleSel.value = String(si);
      applyLookup();
    }
  });
  document.getElementById("helpDialog").addEventListener("click", e => {
    if (e.target.id === "helpDialog") e.target.close();   // click backdrop to close
  });

  // restore selection from URL → localStorage
  (function initSelection() {
    let pc = null, scaleIdx = null;
    try {
      const u = new URL(window.location.href);
      const r = u.searchParams.get("root"), sc = u.searchParams.get("scale");
      if (r != null) { const i = ROOT_NAMES.indexOf(r); if (i >= 0) pc = i; }
      if (sc != null) { const si = SCALES.findIndex(x => x.key === sc); if (si >= 0) scaleIdx = si; }
    } catch (e) {}
    if (pc == null) {
      const saved = load("subbass-key");
      if (saved) { const [rv, sv] = saved.split("|"); if (rv !== "" && rv != null) pc = +rv; if (sv != null && sv !== "") scaleIdx = +sv; }
    }
    if (pc != null) rootSel.value = String(pc);
    if (scaleIdx != null) scaleSel.value = String(scaleIdx);
  })();

  function render(lang) {
    const s = STRINGS[lang];
    CURRENT_LANG = lang;
    document.documentElement.lang = lang;
    document.title = s.title;
    document.getElementById("t-h1").textContent = s.h1;
    document.getElementById("t-intro").textContent = s.intro;
    document.getElementById("t-byKeySummary").textContent = s.byKeySummary;
    document.getElementById("t-keysIntro").textContent = s.keysIntro;
    document.getElementById("helpClose").textContent = s.close;
    document.getElementById("t-whyH2").textContent = s.whyH2;
    document.getElementById("t-realOct").textContent = s.realOct;
    document.getElementById("t-octLayer").textContent = s.octLayer;
    document.getElementById("t-sketch").textContent = s.sketch;
    document.getElementById("legend").innerHTML =
      `<span><i class="chip sweet"></i>${s.legend.sweet}</span>` +
      `<span><i class="chip ok"></i>${s.legend.ok}</span>` +
      `<span><i class="chip sub-z"></i>${s.legend.sub}</span>`;
    document.getElementById("footer").innerHTML =
      `<strong>${s.footerNote}</strong>${s.footerNoteBody}<br>${s.footerEdit}`;
    buildGrid(lang);
    buildTips(lang);
    buildLookupOptions(lang);
    applyLookup();
    document.querySelectorAll("#langToggle button").forEach(b => {
      b.classList.toggle("active", b.dataset.lang === lang);
    });
  }

  /* ---- shared sketch loop (localStorage "subbass-sketch", synced with Polychord Lab) ---- */
  const SK_KEY = "subbass-sketch";
  function skLoad() {
    try { const v = JSON.parse(load(SK_KEY) || "null"); if (v && Array.isArray(v.slots)) return v; } catch (e) {}
    return { v: 1, slots: [], bpm: 124 };
  }
  function skSave(sk) { store(SK_KEY, JSON.stringify(sk)); renderSketch(); }
  function sketchAdd(label, mids) {
    const sk = skLoad();
    if (sk.slots.length >= 8) sk.slots.shift();
    sk.slots.push({ label, mids });
    skSave(sk);
  }
  function chipLabel(chip) {
    const c = chip.cloneNode(true);
    c.querySelectorAll(".deg").forEach(x => x.remove());
    return c.textContent.replace(/\s+/g, " ").trim();
  }
  let skTimer = null, skIdx = 0;
  function skStop() {
    if (skTimer) clearTimeout(skTimer); skTimer = null;
    document.getElementById("skPlay").textContent = "▶";
    document.querySelectorAll(".sk-slot.playing").forEach(el => el.classList.remove("playing"));
  }
  function skTick() {
    const sk = skLoad();
    if (!sk.slots.length) { skStop(); return; }
    skIdx %= sk.slots.length;
    const beat = 60 / (sk.bpm || 124);
    document.querySelectorAll(".sk-slot").forEach(el => el.classList.toggle("playing", +el.dataset.i === skIdx));
    playMids(sk.slots[skIdx].mids, beat * 2 * 0.95);   // one chord = 2 beats
    skIdx++;
    skTimer = setTimeout(skTick, beat * 2 * 1000);
  }
  function renderSketch() {
    const sk = skLoad(), bar = document.getElementById("sketchBar");
    bar.hidden = !sk.slots.length;
    document.body.classList.toggle("has-sketch", !!sk.slots.length);
    document.getElementById("skBpm").value = sk.bpm || 124;
    const box = document.getElementById("skSlots"); box.innerHTML = "";
    sk.slots.forEach((sl, i) => {
      const c = document.createElement("span"); c.className = "sk-slot"; c.dataset.i = i;
      const x = document.createElement("button"); x.className = "sk-x"; x.textContent = "×";
      c.append(sl.label, x);
      c.addEventListener("click", e => {
        if (e.target === x) { const s2 = skLoad(); s2.slots.splice(i, 1); skSave(s2); return; }
        playMids(sl.mids, 1.2);
      });
      box.appendChild(c);
    });
    if (!sk.slots.length) skStop();
  }
  // standard MIDI file (format 0, 480 TPQN): each slot = 2 beats
  function midiFile(slots, bpm) {
    const TPQ = 480, dur = TPQ * 2;
    const vlq = n => { const out = [n & 0x7f]; while (n >>= 7) out.unshift((n & 0x7f) | 0x80); return out; };
    const track = [];
    const uspq = Math.round(60000000 / (bpm || 120));
    track.push(0, 0xFF, 0x51, 0x03, (uspq >> 16) & 255, (uspq >> 8) & 255, uspq & 255);
    let wrote = false;
    for (const sl of slots) {
      const mids = [...new Set(sl.mids || [])].filter(m => m >= 0 && m < 128);
      if (!mids.length) continue;
      wrote = true;
      mids.forEach(m => track.push(0, 0x90, m, 100));
      mids.forEach((m, i) => track.push(...(i === 0 ? vlq(dur) : [0]), 0x80, m, 0));
    }
    if (!wrote) return null;
    track.push(0, 0xFF, 0x2F, 0x00);
    const len = track.length;
    return new Uint8Array([0x4D, 0x54, 0x68, 0x64, 0, 0, 0, 6, 0, 0, 0, 1, (TPQ >> 8) & 255, TPQ & 255,
      0x4D, 0x54, 0x72, 0x6B, (len >>> 24) & 255, (len >> 16) & 255, (len >> 8) & 255, len & 255, ...track]);
  }
  function midiB64(u8) { let b = ""; u8.forEach(x => { b += String.fromCharCode(x); }); return btoa(b); }
  document.getElementById("skPlay").addEventListener("click", () => {
    if (skTimer) { skStop(); return; }
    skIdx = 0; document.getElementById("skPlay").textContent = "■"; skTick();
  });
  document.getElementById("skBpm").addEventListener("change", e => {
    const sk = skLoad(); sk.bpm = Math.min(220, Math.max(40, +e.target.value || 124)); skSave(sk);
  });
  document.getElementById("skClear").addEventListener("click", () => { skSave({ v: 1, slots: [], bpm: skLoad().bpm }); });
  document.getElementById("skMidi").addEventListener("click", () => {
    const sk = skLoad(), u8 = midiFile(sk.slots, sk.bpm); if (!u8) return;
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([u8], { type: "audio/midi" }));
    a.download = "subbass-sketch.mid"; a.click();
  });
  document.getElementById("skMidi").addEventListener("dragstart", e => {
    const sk = skLoad(), u8 = midiFile(sk.slots, sk.bpm); if (!u8) return;
    e.dataTransfer.setData("DownloadURL", "audio/midi:subbass-sketch.mid:data:audio/midi;base64," + midiB64(u8));
  });
  window.addEventListener("storage", e => { if (e.key === SK_KEY) renderSketch(); });
  renderSketch();

  /* ---- language detection + toggle ---- */
  function store(key, val) { try { localStorage.setItem(key, val); } catch (e) {} }
  function load(key) { try { return localStorage.getItem(key); } catch (e) { return null; } }

  function detectLang() {
    const saved = load("subbass-lang");
    if (saved === "en" || saved === "ja") return saved;
    const nav = (navigator.languages && navigator.languages[0]) || navigator.language || "en";
    return String(nav).toLowerCase().startsWith("ja") ? "ja" : "en";
  }

  document.getElementById("langToggle").addEventListener("click", e => {
    const lang = e.target.dataset.lang;
    if (!lang) return;
    store("subbass-lang", lang);
    render(lang);
  });

  render(detectLang());

  /* ---- PWA service worker (offline) ---- */
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    });
  }
</script>
</body>
</html>
